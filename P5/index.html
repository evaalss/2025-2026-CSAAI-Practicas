<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot League</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="balon.jpg">
</head>
<body>
    <div id="game-container">
        <div id="score-display" class="hidden">
            <span id="score-player">0</span> - <span id="score-bot">0</span>
            <div id="mode-display" class="mode-text">Modo de juego</div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="ui-layer">
            <div id="menu-screen">
                <h1>Bot League</h1>
                <p>Elige modo de juego</p>
                <p><strong>1:</strong> A 3 goles </p> 
                <p><strong>2:</strong> Gol de oro</p>
                <p><strong>3:</strong> Tiempo (30 segundos)</p> 
                <p class="controls">Flechas para mover · A/D para girar · Espacio para chutar</p>
            </div>
            <div id="message-screen" class="hidden">
                <h1 id="overlay-text">3</h1>
                <p id="game-over-controls" class="hidden controls">Pulsa R para reiniciar<br>Pulsa M para volver al menú</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
